<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Verbalis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050505;
            color: #e0e0e0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            padding: 30px 20px;
        }
        .header {
            width: 100%;
            max-width: 700px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #1e1e1e;
        }
        .logo { font-size: 18px; font-weight: 700; letter-spacing: 6px; color: #ffffff; }
        .status { font-size: 11px; color: #444; letter-spacing: 2px; }
        #canvas-area { width: 100%; max-width: 700px; display: none; margin-bottom: 15px; }
        canvas { width: 100%; background: #0f0f0f; border: 1px solid #1e1e1e; border-radius: 4px; }
        #chat-box {
            width: 100%;
            max-width: 700px;
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
            margin-bottom: 20px;
            scrollbar-width: none;
        }
        #chat-box::-webkit-scrollbar { display: none; }
        .message-wrap { display: flex; margin: 16px 0; }
        .message-wrap.user { justify-content: flex-end; }
        .message-wrap.ai { justify-content: flex-start; }
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 2px; font-size: 14px; line-height: 1.6; }
        .user .bubble { background: #151515; color: #999; border: 1px solid #1e1e1e; }
        .ai .bubble { background: #0f0f0f; color: #e0e0e0; border: 1px solid #1a1a1a; border-left: 2px solid #333; }
        .sender { font-size: 10px; letter-spacing: 2px; color: #333; margin-bottom: 6px; }
        #input-area {
            width: 100%;
            max-width: 700px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #1e1e1e;
            padding-top: 20px;
        }
        input { flex: 1; padding: 14px 16px; background: #0a0a0a; border: 1px solid #1e1e1e; color: #e0e0e0; border-radius: 2px; font-size: 14px; outline: none; }
        input:focus { border-color: #333; }
        input::placeholder { color: #2a2a2a; }
        button { padding: 14px 24px; background: #ffffff; color: #000000; border: none; border-radius: 2px; cursor: pointer; font-size: 12px; font-weight: 700; letter-spacing: 2px; }
        button:hover { background: #cccccc; }
        .typing { color: #333; font-size: 12px; letter-spacing: 2px; padding: 8px 0; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">VERBALIS</div>
        <div class="status">ONLINE</div>
    </div>
    <div id="canvas-area">
        <canvas id="mathCanvas" height="200"></canvas>
    </div>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="수학 문제를 입력해봐..." />
        <button onclick="sendMessage()">SEND</button>
    </div>

    <script>
        const API_KEY = "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";

        const conversationHistory = JSON.parse(localStorage.getItem('verbalis_history')) || [
            {
                role: "system",
                content: "너는 Verbalis야. 수학 튜터야. 힌트 먼저 줘. 3번 틀리면 답 알려줘. 그래프가 필요하면 답변 끝에 반드시 [GRAPH:x**2+2*x+1] 이런 형식으로 추가해. x의 거듭제곱은 ** 사용해. 곱셈은 * 사용해."
            }
        ];

        const chatBox = document.getElementById('chat-box');
        const canvasArea = document.getElementById('canvas-area');
        const canvas = document.getElementById('mathCanvas');
        const ctx = canvas.getContext('2d');

        function drawGraph(expression) {
            canvas.width = canvas.offsetWidth || 700;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2;
            const scale = 30;

            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, cy); ctx.lineTo(w, cy);
            ctx.moveTo(cx, 0); ctx.lineTo(cx, h);
            ctx.stroke();

            for (let i = -10; i <= 10; i++) {
                ctx.fillStyle = '#222';
                ctx.fillText(i, cx + i * scale - 5, cy + 15);
            }

            ctx.strokeStyle = '#4af';
            ctx.lineWidth = 2;
            ctx.beginPath();
            let started = false;
            for (let px = 0; px < w; px++) {
                const x = (px - cx) / scale;
                let y;
                try {
                    y = eval(expression.replace(/x/g, `(${x})`));
                } catch(e) { continue; }
                const py = cy - y * scale;
                if (isNaN(py) || !isFinite(py)) { started = false; continue; }
                if (!started) { ctx.moveTo(px, py); started = true; }
                else ctx.lineTo(px, py);
            }
            ctx.stroke();
            canvasArea.style.display = 'block';
        }

        function loadHistory() {
            conversationHistory.forEach(msg => {
                if (msg.role === 'user') {
                    chatBox.innerHTML += `<div class="message-wrap user"><div><div class="sender">YOU</div><div class="bubble">${msg.content}</div></div></div>`;
                } else if (msg.role === 'assistant') {
                    const clean = msg.content.replace(/\[GRAPH:[^\]]+\]/g, '');
                    chatBox.innerHTML += `<div class="message-wrap ai"><div><div class="sender">VERBALIS</div><div class="bubble">${clean}</div></div></div>`;
                }
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        loadHistory();

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            chatBox.innerHTML += `<div class="message-wrap user"><div><div class="sender">YOU</div><div class="bubble">${message}</div></div></div>`;
            input.value = '';
            chatBox.innerHTML += `<div class="typing" id="typing">VERBALIS IS THINKING...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            conversationHistory.push({ role: "user", content: message });

            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: conversationHistory
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;

            conversationHistory.push({ role: "assistant", content: reply });
            localStorage.setItem('verbalis_history', JSON.stringify(conversationHistory));

            document.getElementById('typing')?.remove();

            const graphMatch = reply.match(/\[GRAPH:([^\]]+)\]/);
            if (graphMatch) drawGraph(graphMatch[1]);

            const cleanReply = reply.replace(/\[GRAPH:[^\]]+\]/g, '');
            chatBox.innerHTML += `<div class="message-wrap ai"><div><div class="sender">VERBALIS</div><div class="bubble">${cleanReply}</div></div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
