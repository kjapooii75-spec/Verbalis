<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Verbalis</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #050505;
            color: #e0e0e0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            padding: 30px 20px;
        }

        .header {
            width: 100%;
            max-width: 700px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #1e1e1e;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 6px;
            color: #ffffff;
        }

        .status {
            font-size: 11px;
            color: #444;
            letter-spacing: 2px;
        }

        #chat-box {
            width: 100%;
            max-width: 700px;
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
            margin-bottom: 20px;
            scrollbar-width: none;
        }

        #chat-box::-webkit-scrollbar { display: none; }

        .message-wrap {
            display: flex;
            margin: 16px 0;
        }

        .message-wrap.user { justify-content: flex-end; }
        .message-wrap.ai { justify-content: flex-start; }

        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 2px;
            font-size: 14px;
            line-height: 1.6;
        }

        .user .bubble {
            background: #151515;
            color: #999;
            border: 1px solid #1e1e1e;
        }

        .ai .bubble {
            background: #0f0f0f;
            color: #e0e0e0;
            border: 1px solid #1a1a1a;
            border-left: 2px solid #333;
        }

        .sender {
            font-size: 10px;
            letter-spacing: 2px;
            color: #333;
            margin-bottom: 6px;
        }

        #input-area {
            width: 100%;
            max-width: 700px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #1e1e1e;
            padding-top: 20px;
        }

        input {
            flex: 1;
            padding: 14px 16px;
            background: #0a0a0a;
            border: 1px solid #1e1e1e;
            color: #e0e0e0;
            border-radius: 2px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus { border-color: #333; }
        input::placeholder { color: #2a2a2a; }

        button {
            padding: 14px 24px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            transition: background 0.2s;
        }

        button:hover { background: #cccccc; }

        .typing {
            color: #333;
            font-size: 12px;
            letter-spacing: 2px;
            padding: 8px 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">VERBALIS</div>
        <div class="status">ONLINE</div>
    </div>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="입력..." />
        <button onclick="sendMessage()">SEND</button>
    </div>

    <script>
        const API_KEY = "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";

        // 대화 기록 localStorage에 저장
        let conversationHistory = JSON.parse(localStorage.getItem('verbalis_history')) || [
            {
                role: "system",
                content: "너는 Verbalis야. 직설적이고 냉철하고 논리적인 AI야. 감정적인 말 필요없고 핵심만 말해. 공부 도와주는 걸 제일 잘해. 대화 흐름을 기억하고 이전에 한 말을 참고해서 답해. 한국어로 대답해."
            }
        ];

        const chatBox = document.getElementById('chat-box');

        // 저장된 대화 불러오기
        function loadHistory() {
            conversationHistory.forEach(msg => {
                if (msg.role === 'user') {
                    chatBox.innerHTML += `
                        <div class="message-wrap user">
                            <div>
                                <div class="sender">YOU</div>
                                <div class="bubble">${msg.content}</div>
                            </div>
                        </div>`;
                } else if (msg.role === 'assistant') {
                    chatBox.innerHTML += `
                        <div class="message-wrap ai">
                            <div>
                                <div class="sender">VERBALIS</div>
                                <div class="bubble">${msg.content}</div>
                            </div>
                        </div>`;
                }
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        loadHistory();

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            chatBox.innerHTML += `
                <div class="message-wrap user">
                    <div>
                        <div class="sender">YOU</div>
                        <div class="bubble">${message}</div>
                    </div>
                </div>`;
            input.value = '';

            chatBox.innerHTML += `<div class="typing" id="typing">VERBALIS IS THINKING...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            conversationHistory.push({ role: "user", content: message });

            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: conversationHistory
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;

            conversationHistory.push({ role: "assistant", content: reply });
            
            // localStorage에 저장
            localStorage.setItem('verbalis_history', JSON.stringify(conversationHistory));

            document.getElementById('typing')?.remove();

            chatBox.innerHTML += `
                <div class="message-wrap ai">
                    <div>
                        <div class="sender">VERBALIS</div>
                        <div class="bubble">${reply}</div>
                    </div>
                </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
