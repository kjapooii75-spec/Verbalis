<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verbalis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #050505;
  color: #e0e0e0;
  font-family: 'Noto Sans KR', 'Helvetica Neue', sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 200px;
  background: #080808;
  border-right: 1px solid #1a1a1a;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-logo {
  padding: 24px 18px 20px;
  border-bottom: 1px solid #1a1a1a;
}

.logo-text {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 5px;
  color: #fff;
}

.logo-sub {
  font-size: 9px;
  letter-spacing: 2px;
  color: #2a2a2a;
  margin-top: 4px;
}

.sidebar-section {
  font-size: 9px;
  letter-spacing: 2px;
  color: #2a2a2a;
  padding: 16px 18px 8px;
  text-transform: uppercase;
}

.nav-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 18px;
  font-size: 12px;
  color: #444;
  cursor: pointer;
  background: none;
  border: none;
  width: 100%;
  text-align: left;
  letter-spacing: 1px;
  transition: all 0.15s;
  font-family: 'Noto Sans KR', sans-serif;
}
.nav-btn:hover { color: #aaa; background: #0f0f0f; }
.nav-btn.active { color: #fff; background: #111; border-left: 2px solid #fff; }
.nav-btn .n-icon { font-size: 13px; }

.sidebar-divider { border: none; border-top: 1px solid #1a1a1a; margin: 8px 0; }

.subject-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px;
  font-size: 12px;
  color: #333;
  cursor: pointer;
  background: none;
  border: none;
  width: 100%;
  text-align: left;
  letter-spacing: 1px;
  transition: all 0.15s;
  font-family: 'Noto Sans KR', sans-serif;
}
.subject-btn:hover { color: #888; }
.subject-btn.active { color: #ccc; }

.level-wrap { padding: 0 12px 8px; }
.level-select {
  width: 100%;
  padding: 8px 10px;
  background: #0f0f0f;
  border: 1px solid #1e1e1e;
  border-radius: 2px;
  color: #666;
  font-size: 11px;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  outline: none;
  appearance: none;
}

.sidebar-bottom {
  margin-top: auto;
  padding: 12px;
  border-top: 1px solid #1a1a1a;
}

.clear-btn {
  width: 100%;
  padding: 8px;
  background: none;
  border: 1px solid #1a1a1a;
  border-radius: 2px;
  color: #333;
  font-size: 10px;
  letter-spacing: 1px;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.15s;
}
.clear-btn:hover { color: #666; border-color: #333; }

/* ── MAIN ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 28px;
  border-bottom: 1px solid #1e1e1e;
  flex-shrink: 0;
}

.header-title {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 3px;
  color: #fff;
}

.header-sub {
  font-size: 9px;
  letter-spacing: 2px;
  color: #2a2a2a;
  margin-top: 3px;
}

.status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 9px;
  color: #2a2a2a;
  letter-spacing: 2px;
}

.status-dot {
  width: 5px; height: 5px;
  background: #2a2a2a;
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── PAGE: RADAR ── */
#page-radar {
  flex: 1;
  overflow-y: auto;
  padding: 28px;
  scrollbar-width: none;
}
#page-radar::-webkit-scrollbar { display: none; }

.radar-hero { margin-bottom: 28px; }

.radar-live {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 9px;
  letter-spacing: 2px;
  color: #444;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.live-dot {
  width: 5px; height: 5px;
  background: #fff;
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}

.radar-title {
  font-size: 22px;
  font-weight: 500;
  color: #fff;
  letter-spacing: -0.5px;
  line-height: 1.4;
  margin-bottom: 20px;
}

.radar-title span { color: #888; }

.ask-bar {
  display: flex;
  gap: 8px;
  max-width: 580px;
  margin-bottom: 14px;
}

.ask-input {
  flex: 1;
  padding: 12px 16px;
  background: #0a0a0a;
  border: 1px solid #1e1e1e;
  border-radius: 2px;
  color: #e0e0e0;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
  transition: border-color 0.15s;
}
.ask-input:focus { border-color: #333; }
.ask-input::placeholder { color: #222; }

.ask-btn {
  padding: 12px 20px;
  background: #fff;
  color: #000;
  border: none;
  border-radius: 2px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  white-space: nowrap;
  transition: background 0.15s;
}
.ask-btn:hover { background: #ccc; }

.ask-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.ask-chip {
  padding: 5px 12px;
  border: 1px solid #1e1e1e;
  border-radius: 2px;
  font-size: 11px;
  color: #333;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}
.ask-chip:hover { color: #aaa; border-color: #333; }

#ai-box { display: none; margin-bottom: 24px; max-width: 580px; }

.ai-box-inner {
  background: #0a0a0a;
  border: 1px solid #2a2a2a;
  border-left: 2px solid #fff;
  border-radius: 2px;
  overflow: hidden;
  animation: fadeUp 0.25s ease;
}

.ai-box-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid #1a1a1a;
}

.ai-box-label { font-size: 9px; letter-spacing: 2px; color: #555; text-transform: uppercase; }
.ai-box-close { background: none; border: none; color: #333; cursor: pointer; font-size: 16px; line-height: 1; }

.ai-box-body {
  padding: 16px;
  font-size: 13.5px;
  line-height: 1.85;
  color: #ccc;
  white-space: pre-wrap;
  min-height: 48px;
}

.typing-dots { display:flex; gap:5px; padding:4px 0; }
.tdot { width:5px; height:5px; background:#333; border-radius:50%; animation: bounce 1.2s infinite; }
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}

.news-grid-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  padding-top: 4px;
  border-top: 1px solid #1a1a1a;
}

.news-grid-title { font-size: 10px; letter-spacing: 2px; color: #444; text-transform: uppercase; }

.filter-tabs { display: flex; gap: 4px; }

.filter-tab {
  padding: 4px 10px;
  border: 1px solid #1a1a1a;
  border-radius: 2px;
  font-size: 10px;
  color: #333;
  cursor: pointer;
  background: none;
  letter-spacing: 1px;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.15s;
}
.filter-tab:hover { color: #888; border-color: #333; }
.filter-tab.active { color: #fff; border-color: #fff; background: #111; }

.news-card {
  background: #0a0a0a;
  border: 1px solid #1a1a1a;
  border-radius: 2px;
  padding: 18px 20px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.news-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: transparent;
  transition: background 0.15s;
}
.news-card:hover { background: #0f0f0f; }
.news-card:hover::before { background: #fff; }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
.card-tags { display: flex; gap: 5px; }
.ctag { font-size: 9px; letter-spacing: 1.5px; padding: 2px 7px; border-radius: 1px; text-transform: uppercase; }
.ct-hot { background: #1a1000; color: #887030; border: 1px solid #2a2000; }
.ct-policy { background: #0a100a; color: #3a6a3a; border: 1px solid #1a2a1a; }
.ct-tip { background: #0a0a18; color: #3a3a8a; border: 1px solid #1a1a2a; }
.ct-suneung { background: #150a0a; color: #8a4a4a; border: 1px solid #2a1515; }
.card-date { font-size: 10px; color: #2a2a2a; }
.card-title { font-size: 14px; font-weight: 500; color: #ccc; line-height: 1.5; margin-bottom: 7px; }
.card-summary { font-size: 12.5px; color: #444; line-height: 1.7; margin-bottom: 10px; }

.card-ai-summary {
  display: none;
  background: #080808;
  border: 1px solid #1a1a1a;
  border-left: 2px solid #2a2a2a;
  padding: 10px 14px;
  font-size: 12px;
  color: #666;
  line-height: 1.8;
  white-space: pre-wrap;
  margin-bottom: 10px;
}

.card-ai-label { font-size: 9px; letter-spacing: 1.5px; color: #333; text-transform: uppercase; margin-bottom: 6px; }
.card-bottom { display: flex; align-items: center; justify-content: space-between; }
.card-impact { font-size: 11px; color: #2a2a2a; }
.expand-btn { font-size: 10px; color: #444; background: none; border: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; letter-spacing: 1px; transition: color 0.15s; }
.expand-btn:hover { color: #aaa; }

.dday-strip { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
.dday-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 2px; padding: 12px 16px; flex: 1; min-width: 140px; }
.dday-label { font-size: 9px; letter-spacing: 2px; color: #333; text-transform: uppercase; margin-bottom: 6px; }
.dday-name { font-size: 12px; color: #888; margin-bottom: 4px; }
.dday-num { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }

.trending-strip { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
.trend-chip { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid #1a1a1a; border-radius: 2px; cursor: pointer; transition: all 0.15s; }
.trend-chip:hover { border-color: #333; }
.trend-rank { font-size: 9px; color: #333; }
.trend-text { font-size: 11px; color: #555; letter-spacing: 0.5px; }
.trend-up { font-size: 9px; color: #666; }

/* ── PAGE: TUTOR ── */
#page-tutor { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

#canvas-area { display:none; padding: 0 28px; flex-shrink:0; }
canvas { width:100%; background:#0f0f0f; border:1px solid #1e1e1e; border-radius:2px; margin:10px 0; }

#chat-box { flex: 1; overflow-y: auto; padding: 20px 28px; scrollbar-width: none; }
#chat-box::-webkit-scrollbar { display:none; }

.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; gap: 10px; animation: fadeUp 0.4s ease; }
.welcome-icon { font-size: 32px; }
.welcome-title { font-size: 12px; letter-spacing: 3px; color: #444; }
.welcome-chips { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:8px; }
.w-chip { padding: 6px 13px; border: 1px solid #1e1e1e; border-radius: 2px; font-size: 11px; letter-spacing: 0.5px; color: #333; cursor: pointer; transition: all 0.15s; font-family: 'Noto Sans KR', sans-serif; }
.w-chip:hover { color: #aaa; border-color: #444; }

.message-wrap { display:flex; margin:12px 0; animation:fadeUp 0.2s ease; }
.message-wrap.user { justify-content:flex-end; }
.message-wrap.ai { justify-content:flex-start; }
.bubble { max-width: 75%; padding: 12px 16px; border-radius: 2px; font-size: 14px; line-height: 1.75; white-space: pre-wrap; word-break: break-word; }
.user .bubble { background:#151515; color:#888; border:1px solid #1e1e1e; }
.ai .bubble { background:#0f0f0f; color:#e0e0e0; border:1px solid #1a1a1a; border-left:2px solid #2a2a2a; }
.sender { font-size:9px; letter-spacing:2px; color:#2a2a2a; margin-bottom:5px; }
.message-wrap.user .sender { text-align:right; }

.msg-tag { display: inline-block; font-size: 9px; letter-spacing: 1.5px; padding: 2px 7px; border-radius: 1px; margin-bottom: 6px; text-transform: uppercase; }
.tag-hint { background:#1a1500; color:#887030; border:1px solid #2a2000; }
.tag-explain { background:#0a120a; color:#3a6a3a; border:1px solid #1a2a1a; }
.tag-answer { background:#150a0a; color:#8a3a3a; border:1px solid #2a1010; }

.typing-wrap { display:flex; padding:6px 0; }
.typing-bubble { background:#0f0f0f; border:1px solid #1a1a1a; border-left:2px solid #2a2a2a; padding:12px 16px; display:flex; align-items:center; gap:5px; }

#tutor-input-area { display: flex; gap: 10px; border-top: 1px solid #1e1e1e; padding: 18px 28px; flex-shrink: 0; }

#user-input { flex: 1; padding: 12px 16px; background: #0a0a0a; border: 1px solid #1e1e1e; color: #e0e0e0; border-radius: 2px; font-size: 14px; outline: none; font-family: 'Noto Sans KR', sans-serif; transition: border-color 0.15s; }
#user-input:focus { border-color: #2a2a2a; }
#user-input::placeholder { color: #1e1e1e; }

.send-btn { padding: 12px 22px; background: #ffffff; color: #000; border: none; border-radius: 2px; cursor: pointer; font-size: 11px; font-weight: 700; letter-spacing: 2px; font-family: 'Noto Sans KR', sans-serif; transition: background 0.15s; }
.send-btn:hover { background: #ccc; }

@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

@media (max-width: 600px) {
  .sidebar { display:none; }
  .header, #page-radar, #chat-box, #tutor-input-area { padding-left:16px; padding-right:16px; }
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-text">VERBALIS</div>
    <div class="logo-sub">교육 AI 플랫폼</div>
  </div>

  <div class="sidebar-section">메뉴</div>
  <button class="nav-btn active" id="nav-radar" onclick="showPage('radar', this)">
    <span class="n-icon">📡</span> 교육 레이더
  </button>
  <button class="nav-btn" id="nav-tutor" onclick="showPage('tutor', this)">
    <span class="n-icon">📚</span> AI 과외
  </button>

  <div id="tutor-controls" style="display:none">
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">과목</div>
    <button class="subject-btn active" onclick="setSubject('수학','📐',this)"><span>📐</span> 수학</button>
    <button class="subject-btn" onclick="setSubject('물리','⚡',this)"><span>⚡</span> 물리</button>
    <button class="subject-btn" onclick="setSubject('화학','🧪',this)"><span>🧪</span> 화학</button>
    <button class="subject-btn" onclick="setSubject('생물','🧬',this)"><span>🧬</span> 생물</button>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">학년</div>
    <div class="level-wrap">
      <select class="level-select" id="level-select" onchange="setLevel(this.value)">
        <option value="초등학생">초등학생</option>
        <option value="중학생">중학생</option>
        <option value="고등학생" selected>고등학생</option>
        <option value="수능 수험생">수능 수험생</option>
        <option value="대학생">대학생</option>
      </select>
    </div>
  </div>

  <div class="sidebar-bottom">
    <button class="clear-btn" onclick="clearTutor()">대화 초기화</button>
  </div>
</div>

<div class="main">
  <div class="header">
    <div>
      <div class="header-title" id="header-title">교육 레이더</div>
      <div class="header-sub" id="header-sub">실시간 교육 변화 감지</div>
    </div>
    <div class="status"><div class="status-dot"></div>ONLINE</div>
  </div>

  <!-- RADAR -->
  <div id="page-radar">
    <div class="radar-hero">
      <div class="radar-live"><div class="live-dot"></div>실시간 감지 중</div>
      <div class="radar-title">교육 변화,<br><span>설명회 없이</span> 바로 이해</div>
      <div class="ask-bar">
        <input class="ask-input" id="radar-input" placeholder="예) 2028 수능 개편 설명해줘, 의대 정원 영향은?" />
        <button class="ask-btn" onclick="radarAsk()">AI 분석</button>
      </div>
      <div class="ask-chips">
        <div class="ask-chip" onclick="setRadarInput('2028 수능 개편 핵심 정리해줘')">2028 수능 개편</div>
        <div class="ask-chip" onclick="setRadarInput('의대 정원 확대 입시에 어떤 영향?')">의대 정원 영향</div>
        <div class="ask-chip" onclick="setRadarInput('고교학점제 뭐야?')">고교학점제</div>
        <div class="ask-chip" onclick="setRadarInput('수시 vs 정시 뭐가 유리해?')">수시 vs 정시</div>
        <div class="ask-chip" onclick="setRadarInput('킬러문항 폐지 이후 변화 알려줘')">킬러문항 폐지</div>
      </div>
    </div>

    <div id="ai-box">
      <div class="ai-box-inner">
        <div class="ai-box-header">
          <div class="ai-box-label">AI 분석</div>
          <button class="ai-box-close" onclick="document.getElementById('ai-box').style.display='none'">×</button>
        </div>
        <div class="ai-box-body" id="ai-box-body"></div>
      </div>
    </div>

    <div class="dday-strip">
      <div class="dday-card"><div class="dday-label">수능까지</div><div class="dday-name">2026 수능</div><div class="dday-num" id="dd1">—</div></div>
      <div class="dday-card"><div class="dday-label">수시 원서</div><div class="dday-name">2026 수시</div><div class="dday-num" id="dd2">—</div></div>
      <div class="dday-card"><div class="dday-label">정시 원서</div><div class="dday-name">2027 정시</div><div class="dday-num" id="dd3">—</div></div>
    </div>

    <div class="news-grid-header" style="margin-bottom:12px;border-top:none">
      <div class="news-grid-title">🔥 지금 뜨는 키워드</div>
    </div>
    <div class="trending-strip">
      <div class="trend-chip" onclick="setRadarInput('의대 정원 확대 어떻게 돼?')"><span class="trend-rank">01</span><span class="trend-text">의대 정원 확대</span><span class="trend-up">▲</span></div>
      <div class="trend-chip" onclick="setRadarInput('2028 수능 개편 설명해줘')"><span class="trend-rank">02</span><span class="trend-text">2028 수능 개편</span><span class="trend-up">NEW</span></div>
      <div class="trend-chip" onclick="setRadarInput('고교학점제 어떻게 달라져?')"><span class="trend-rank">03</span><span class="trend-text">고교학점제</span><span class="trend-up">▲</span></div>
      <div class="trend-chip" onclick="setRadarInput('킬러문항 폐지 어떻게 됐어?')"><span class="trend-rank">04</span><span class="trend-text">킬러문항 폐지</span></div>
      <div class="trend-chip" onclick="setRadarInput('내신 절대평가 바뀌는 거 설명해줘')"><span class="trend-rank">05</span><span class="trend-text">내신 절대평가</span><span class="trend-up">▲</span></div>
    </div>

    <div class="news-grid-header">
      <div class="news-grid-title">최신 교육 뉴스</div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterNews('전체',this)">전체</button>

function dday(dateStr) {
  const diff = Math.ceil((new Date(dateStr) - new Date()) / 86400000);
  return diff > 0 ? `D-${diff}` : diff === 0 ? 'D-Day' : `D+${Math.abs(diff)}`;
}

// ── News ──
const newsData = [
  { id:1, cat:'수능/입시', tags:[['ct-suneung','🔥 화제'],['ct-hot','📝 수능']], date:'2026.03.20', title:'2028 수능 개편안 확정 — 통합사회·과학 신설, 선택과목 축소', summary:'교육부가 2028 수능 개편안을 확정 발표. 사회·과학 영역이 통합되고 선택과목 구조가 대폭 축소됩니다.', ai:'✅ 핵심 요약\n• 사회/과학 → 통합사회, 통합과학으로 묶임\n• 현재 중3이 첫 적용 대상\n• 수학 선택과목(기하, 경제수학) 유지\n\n👨‍👩‍👧 학부모: 현재 중2~3 자녀라면 지금 공부법 바꿔야 해요.', impact:'⚡ 영향도 매우 높음' },
  { id:2, cat:'수능/입시', tags:[['ct-policy','📋 정책']], date:'2026.03.18', title:'의대 정원 2천명 추가 확정 — 입시 판도 어떻게 바뀌나', summary:'의대 정원이 기존 3,058명 → 5,058명으로 확대 확정. 이과 상위권 수험생 입시 전략에 큰 변화 예상.', ai:'✅ 핵심 요약\n• 이과 최상위권 의대 쏠림 심화 예상\n• 서울대 공대 등 커트라인 하락 가능성\n• 재학생보다 재수생에게 유리한 구조', impact:'⚡ 영향도 매우 높음' },
  { id:3, cat:'정책', tags:[['ct-policy','📋 정책']], date:'2026.03.15', title:'고교학점제 전면 시행 — 2025년 입학생부터 적용', summary:'고등학생이 원하는 과목을 선택해 이수하는 고교학점제가 2025년 입학생부터 전면 적용됩니다.', ai:'✅ 핵심 요약\n• 192학점 이수 시 졸업\n• 원하는 과목 직접 선택 가능\n• 미이수 시 보충 의무', impact:'⚠️ 영향도 높음' },
  { id:4, cat:'수능/입시', tags:[['ct-tip','💡 분석']], date:'2026.03.12', title:'킬러문항 폐지 2년 후 — 수능 난이도 실제로 어떻게 바뀌었나', summary:'킬러문항 폐지 후 초고난도 문제가 준킬러 여러 개로 대체됐습니다. 상위권 변별력은 유지되고 있습니다.', ai:'✅ 핵심 요약\n• 초고난도 1~2문제 → 준킬러 3~5문제로 대체\n• 1등급 컷은 오히려 오른 과목도 있음\n\n📚 공부법: 킬러보다 준킬러 대비가 더 중요해졌어요.', impact:'📌 참고' },
  { id:5, cat:'정책', tags:[['ct-policy','📋 정책']], date:'2026.03.10', title:'AI 교과서 전국 초중고 도입 — 수학·영어부터 시작', summary:'교육부가 AI 디지털 교과서를 전국에 단계적 도입. 2026년 초3~4, 중1, 고1 수학/영어/정보 우선 도입.', ai:'✅ 핵심 요약\n• 2026년: 초3~4, 중1, 고1 수학/영어 우선\n• 2028년: 전 학년 전 과목 확대', impact:'⚠️ 영향도 높음' },
  { id:6, cat:'팁', tags:[['ct-tip','💡 팁']], date:'2026.03.08', title:'학생부종합전형 2026 — 자소서 폐지 후 달라진 평가 핵심', summary:'자기소개서 완전 폐지 후 세부능력특기사항이 전부가 됐습니다. 2026 주요 대학 평가기준 정리.', ai:'✅ 핵심 요약\n• 자기소개서 완전 폐지\n• 세특 기재 과목당 최대 500자\n• 교사 추천서도 폐지', impact:'⚠️ 영향도 높음' }
];

function renderNews(filter) {
  const filtered = filter === '전체' ? newsData : newsData.filter(n => n.cat === filter);
  document.getElementById('news-feed').innerHTML = filtered.map(n => `

}

function toggleAI(id) {
  const el = document.getElementById(`ais-${id}`);

  const open = el.style.display === 'block';
  el.style.display = open ? 'none' : 'block';

  const q = document.getElementById('radar-input').value.trim();

  try {
    const reply = await callAI([
      { role:'system', content:'너는 한국 교육 전문 AI야. 학부모와 수험생이 이해할 수 있게 쉽고 친근하게 설명해줘. 핵심을 bullet point로 정리하고, 학부모/수험생 입장 나눠서 설명해줘. 300자 내외로 간결하게.' },
      { role:'user', content: q }

}

document.getElementById('radar-input').addEventListener('keypress', e => { if(e.key==='Enter') radarAsk(); });

// ── Tutor ──
let currentSubject = '수학';
let currentIcon = '📐';
let currentLevel = '고등학생';
let wrongCount = 0;
let tutorHistory = JSON.parse(localStorage.getItem('verbalis_v4')) || [];

const subjectData = {
  '수학': { icon:'📐', chips:['이차방정식 풀기','미적분 기초','확률과 통계','수능 수학 공부법'], asks:['이차방정식 푸는 법 알려줘','미적분 기초 개념 설명해줘','확률 문제 어떻게 풀어?','수능 수학 공부 어떻게 해?'] },
  '물리': { icon:'⚡', chips:['뉴턴의 법칙','운동에너지','전기회로 기초','파동과 빛'], asks:['뉴턴의 운동 법칙 설명해줘','운동에너지랑 위치에너지 차이?','전기회로 기초 알려줘','파동과 빛 개념 설명해줘'] },
  '화학': { icon:'🧪', chips:['주기율표 보는 법','산화환원 반응','몰 계산','화학 결합'], asks:['주기율표 어떻게 읽어?','산화환원 반응 쉽게 설명해줘','몰 계산하는 법 알려줘','공유결합 이온결합 차이?'] },
  '생물': { icon:'🧬', chips:['세포 구조','DNA와 유전','광합성 과정','진화론'], asks:['세포 구조 설명해줘','DNA 복제 과정 알려줘','광합성 어떻게 일어나?','진화론 핵심 개념 뭐야?'] }
};

function renderWelcomeChips() {
  const d = subjectData[currentSubject];

    `<div class="w-chip" onclick="quickAsk('${d.asks[i]}')">${c}</div>`
  ).join('');
}

function setSubject(subject, icon, btn) {
  currentSubject = subject;
  currentIcon = subjectData[subject].icon;
  document.querySelectorAll('.subject-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.getElementById('header-title').textContent = `${currentIcon} ${subject} 과외`;
  renderWelcomeChips();
}

function setLevel(level) {

}

function quickAsk(text) {
  document.getElementById('user-input').value = text;

function clearTutor() {
  if (!confirm('대화를 초기화할까요?')) return;
  tutorHistory = [];
  localStorage.removeItem('verbalis_v4');
  wrongCount = 0;
  document.getElementById('chat-box').innerHTML = `
    <div class="welcome" id="welcome">
      <div class="welcome-icon" id="welcome-icon">${currentIcon}</div>
      <div class="welcome-title" id="welcome-title">${currentSubject} 선생님 — 무엇이든 물어보세요</div>
      <div class="welcome-chips" id="welcome-chips"></div>
    </div>`;
  renderWelcomeChips();
  document.getElementById('canvas-area').style.display = 'none';
}

function appendMsg(role, content) {
  document.getElementById('welcome')?.remove();
  const box = document.getElementById('chat-box');
  const wrap = document.createElement('div');
  wrap.className = `message-wrap ${role}`;
  let tagHtml = '', clean = content;
  if (role === 'ai') {
    if (content.startsWith('[힌트]')) { tagHtml = '<div class="msg-tag tag-hint">💡 힌트</div>'; clean = content.replace('[힌트]','').trim(); }
    else if (content.startsWith('[설명]')) { tagHtml = '<div class="msg-tag tag-explain">📖 설명</div>'; clean = content.replace('[설명]','').trim(); }
    else if (content.startsWith('[정답]')) { tagHtml = '<div class="msg-tag tag-answer">✅ 정답</div>'; clean = content.replace('[정답]','').trim(); }
  }
  wrap.innerHTML = role === 'user'
    ? `<div><div class="sender">YOU</div><div class="bubble">${clean}</div></div>`
    : `<div><div class="sender">VERBALIS</div>${tagHtml}<div class="bubble">${clean}</div></div>`;
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

function showTutorTyping() {
  const box = document.getElementById('chat-box');
  const el = document.createElement('div');
  el.id = 'typing-el';
  el.className = 'typing-wrap';
  el.innerHTML = `<div class="typing-bubble"><div class="typing-dots"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div></div>`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function drawGraph(expr) {
  const area = document.getElementById('canvas-area');
  const canvas = document.getElementById('mathCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth || 700;
  const w=canvas.width, h=canvas.height, cx=w/2, cy=h/2, sc=30;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=1;
  for(let i=-10;i<=10;i++){
    ctx.beginPath(); ctx.moveTo(cx+i*sc,0); ctx.lineTo(cx+i*sc,h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,cy+i*sc); ctx.lineTo(w,cy+i*sc); ctx.stroke();
  }
  ctx.strokeStyle='#333'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(w,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,h); ctx.stroke();
  ctx.fillStyle='#2a2a2a'; ctx.font='9px monospace'; ctx.textAlign='center';
  for(let i=-8;i<=8;i++) if(i!==0) ctx.fillText(i, cx+i*sc, cy+13);
  ctx.strokeStyle='#4af'; ctx.lineWidth=2;
  ctx.beginPath(); let started=false;
  for(let px=0;px<w;px++){
    const x=(px-cx)/sc; let y;
    try{ y=eval(expr.replace(/x/g,`(${x})`)); }catch(e){continue;}
    const py=cy-y*sc;
    if(isNaN(py)||!isFinite(py)){started=false;continue;}
    if(!started){ctx.moveTo(px,py);started=true;}else ctx.lineTo(px,py);
  }
  ctx.stroke();
  area.style.display='block';
}

async function sendTutor() {
  const input = document.getElementById('user-input');
  const msg = input.value.trim();
  if (!msg) return;
  appendMsg('user', msg);
  input.value = '';
  showTutorTyping();
  tutorHistory.push({ role:'user', content:msg });
  try {
    const reply = await callAI([
      { role:'system', content:`너는 Verbalis야. 한국 ${currentSubject} 과외 선생님. 학생 수준: ${currentLevel}. 현재 틀린 횟수: ${wrongCount}번.\n규칙: 1)친근하게 2)문제는 힌트 먼저 3)3번 틀리면 정답 4)그래프 필요하면 [GRAPH:수식] 추가 5)답변 앞에 [힌트][설명][정답] 중 하나 붙이기` },
      ...tutorHistory
    ]);
    tutorHistory.push({ role:'assistant', content:reply });
    localStorage.setItem('verbalis_v4', JSON.stringify(tutorHistory));
    document.getElementById('typing-el')?.remove();
    const graph = reply.match(/\[GRAPH:([^\]]+)\]/);
    if(graph) drawGraph(graph[1]);
    const clean = reply.replace(/\[GRAPH:[^\]]+\]/g,'').trim();
    appendMsg('ai', clean);
    const lc = reply.toLowerCase();
    if(lc.includes('틀')||lc.includes('아쉽')) wrongCount = Math.min(wrongCount+1,3);
    else if(lc.includes('맞아')||lc.includes('정확')||reply.includes('[정답]')) wrongCount=0;
  } catch(e) {
    document.getElementById('typing-el')?.remove();
    appendMsg('ai','[설명] 연결이 끊겼어. 다시 보내줄 수 있어?');
  }
}

document.getElementById('user-input').addEventListener('keypress', e => { if(e.key==='Enter') sendTutor(); });

// Init
renderNews('전체');
renderWelcomeChips();
if(tutorHistory.length > 0) {
  tutorHistory.forEach(m => {
    if(m.role==='user') appendMsg('user', m.content);
    else if(m.role==='assistant') appendMsg('ai', m.content.replace(/\[GRAPH:[^\]]+\]/g,'').trim());
  });
}
