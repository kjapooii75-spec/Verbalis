<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Verbalis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050505;
            color: #e0e0e0;
            font-family: 'Noto Sans KR', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
 
        /* ── SIDEBAR ── */
        .sidebar {
            width: 200px;
            background: #080808;
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            padding: 24px 0 16px;
        }
        .sidebar-logo {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 5px;
            color: #fff;
            padding: 0 16px 20px;
            border-bottom: 1px solid #1a1a1a;
        }
        .sidebar-logo span {
            display: block;
            font-size: 9px;
            font-weight: 300;
            letter-spacing: 2px;
            color: #333;
            margin-top: 4px;
        }
        .sidebar-label {
            font-size: 9px;
            letter-spacing: 2px;
            color: #333;
            padding: 16px 16px 8px;
            text-transform: uppercase;
        }
        .subject-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 16px;
            font-size: 13px;
            color: #444;
            cursor: pointer;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            letter-spacing: 1px;
            transition: all 0.15s;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .subject-btn:hover { color: #aaa; background: #0f0f0f; }
        .subject-btn.active { color: #fff; background: #111; border-left: 2px solid #fff; }
        .subject-btn .s-icon { font-size: 14px; }
 
        .sidebar-divider { border: none; border-top: 1px solid #1a1a1a; margin: 12px 0; }
 
        .level-wrap { padding: 0 12px; }
        .level-select {
            width: 100%;
            padding: 8px 10px;
            background: #0f0f0f;
            border: 1px solid #1e1e1e;
            border-radius: 2px;
            color: #888;
            font-size: 12px;
            font-family: 'Noto Sans KR', sans-serif;
            cursor: pointer;
            outline: none;
            appearance: none;
        }
        .level-select:focus { border-color: #333; }
 
        .clear-btn {
            margin: auto 12px 0;
            padding: 8px 10px;
            background: none;
            border: 1px solid #1a1a1a;
            border-radius: 2px;
            color: #333;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
            width: calc(100% - 24px);
            transition: all 0.15s;
        }
        .clear-btn:hover { color: #666; border-color: #333; }
 
        /* ── MAIN ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }
 
        .header {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 28px;
            border-bottom: 1px solid #1e1e1e;
            flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-subject { font-size: 13px; font-weight: 500; letter-spacing: 3px; color: #ffffff; }
        .header-level { font-size: 10px; letter-spacing: 2px; color: #333; }
        .status { font-size: 10px; color: #333; letter-spacing: 2px; display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 5px; height: 5px; background: #3a3a3a; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
 
        #canvas-area { width: 100%; display: none; padding: 0 28px; flex-shrink: 0; }
        canvas { width: 100%; background: #0f0f0f; border: 1px solid #1e1e1e; border-radius: 2px; margin: 12px 0; }
 
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 16px 28px;
            scrollbar-width: none;
        }
        #chat-box::-webkit-scrollbar { display: none; }
 
        /* Welcome */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            gap: 12px;
            animation: fadeUp 0.4s ease;
        }
        .welcome-icon { font-size: 36px; }
        .welcome-title { font-size: 14px; letter-spacing: 3px; color: #555; }
        .welcome-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
        .chip {
            padding: 7px 14px;
            border: 1px solid #1e1e1e;
            border-radius: 2px;
            font-size: 11px;
            letter-spacing: 1px;
            color: #444;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .chip:hover { color: #ccc; border-color: #444; }
 
        @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
 
        /* Messages */
        .message-wrap { display: flex; margin: 14px 0; animation: fadeUp 0.2s ease; }
        .message-wrap.user { justify-content: flex-end; }
        .message-wrap.ai { justify-content: flex-start; }
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 2px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
        .user .bubble { background: #151515; color: #888; border: 1px solid #1e1e1e; }
        .ai .bubble { background: #0f0f0f; color: #e0e0e0; border: 1px solid #1a1a1a; border-left: 2px solid #2a2a2a; }
        .sender { font-size: 9px; letter-spacing: 2px; color: #2a2a2a; margin-bottom: 5px; }
        .message-wrap.user .sender { text-align: right; }
 
        /* Tag badges */
        .msg-tag {
            display: inline-block;
            font-size: 9px;
            letter-spacing: 1.5px;
            padding: 2px 7px;
            border-radius: 1px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .tag-hint { background: #1a1500; color: #9a7a20; border: 1px solid #2a2200; }
        .tag-explain { background: #0a120a; color: #3a6a3a; border: 1px solid #1a2a1a; }
        .tag-answer { background: #150a0a; color: #8a3a3a; border: 1px solid #2a1010; }
 
        /* Typing */
        .typing {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 12px 0;
        }
        .typing-dot {
            width: 5px; height: 5px;
            background: #2a2a2a;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-4px);opacity:1} }
 
        /* Input */
        #input-area {
            width: 100%;
            display: flex;
            gap: 10px;
            border-top: 1px solid #1e1e1e;
            padding: 20px 28px;
            flex-shrink: 0;
        }
        input {
            flex: 1;
            padding: 13px 16px;
            background: #0a0a0a;
            border: 1px solid #1e1e1e;
            color: #e0e0e0;
            border-radius: 2px;
            font-size: 14px;
            outline: none;
            font-family: 'Noto Sans KR', sans-serif;
            transition: border-color 0.15s;
        }
        input:focus { border-color: #2a2a2a; }
        input::placeholder { color: #222; }
        button.send-btn {
            padding: 13px 22px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            font-family: 'Noto Sans KR', sans-serif;
            transition: background 0.15s;
        }
        button.send-btn:hover { background: #cccccc; }
 
        @media (max-width: 600px) {
            .sidebar { display: none; }
            .header, #chat-box, #input-area { padding-left: 16px; padding-right: 16px; }
        }
    </style>
</head>
<body>
 
<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-logo">
        VERBALIS
        <span>나만의 과외 선생님</span>
    </div>
 
    <div class="sidebar-label">과목</div>
    <button class="subject-btn active" onclick="setSubject('수학', '📐', this)"><span class="s-icon">📐</span> 수학</button>
    <button class="subject-btn" onclick="setSubject('물리', '⚡', this)"><span class="s-icon">⚡</span> 물리</button>
    <button class="subject-btn" onclick="setSubject('화학', '🧪', this)"><span class="s-icon">🧪</span> 화학</button>
    <button class="subject-btn" onclick="setSubject('생물', '🧬', this)"><span class="s-icon">🧬</span> 생물</button>
 
    <hr class="sidebar-divider">
 
    <div class="sidebar-label">학년</div>
    <div class="level-wrap">
        <select class="level-select" id="level-select" onchange="setLevel(this.value)">
            <option value="초등학생">초등학생</option>
            <option value="중학생">중학생</option>
            <option value="고등학생" selected>고등학생</option>
            <option value="수능 수험생">수능 수험생</option>
            <option value="대학생">대학생</option>
        </select>
    </div>
 
    <button class="clear-btn" onclick="clearChat()">대화 초기화</button>
</div>
 
<!-- Main -->
<div class="main">
    <div class="header">
        <div class="header-left">
            <div>
                <div class="header-subject" id="header-subject">📐 수학</div>
                <div class="header-level" id="header-level">고등학생</div>
            </div>
        </div>
        <div class="status"><div class="status-dot"></div>ONLINE</div>
    </div>
 
    <div id="canvas-area">
        <canvas id="mathCanvas" height="200"></canvas>
    </div>
 
    <div id="chat-box">
        <div class="welcome" id="welcome">
            <div class="welcome-icon" id="welcome-icon">📐</div>
            <div class="welcome-title" id="welcome-title">수학 선생님입니다. 무엇이든 물어보세요.</div>
            <div class="welcome-chips" id="welcome-chips"></div>
        </div>
    </div>
 
    <div id="input-area">
        <input type="text" id="user-input" placeholder="모르는 문제나 개념을 입력해봐..." />
        <button class="send-btn" onclick="sendMessage()">SEND</button>
    </div>
</div>
 
<script>
    const API_KEY = "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";
 
    let currentSubject = '수학';
    let currentIcon = '📐';
    let currentLevel = '고등학생';
    let wrongCount = 0;
 
    const subjectData = {
        '수학': {
            icon: '📐',
            chips: ['이차방정식 풀기', '미적분 기초 개념', '확률과 통계', '수능 수학 공부법'],
            asks: ['이차방정식 푸는 법 알려줘', '미적분 기초 개념 설명해줘', '확률 문제 어떻게 풀어?', '수능 수학 공부 어떻게 해야 해?']
        },
        '물리': {
            icon: '⚡',
            chips: ['뉴턴의 법칙', '운동에너지 개념', '전기회로 기초', '파동과 빛'],
            asks: ['뉴턴의 운동 법칙 설명해줘', '운동에너지랑 위치에너지 차이 뭐야?', '전기회로 기초 알려줘', '파동과 빛 개념 설명해줘']
        },
        '화학': {
            icon: '🧪',
            chips: ['주기율표 보는 법', '산화환원 반응', '몰 계산', '화학 결합 종류'],
            asks: ['주기율표 어떻게 읽어?', '산화환원 반응 쉽게 설명해줘', '몰 계산하는 법 알려줘', '공유결합 이온결합 차이 뭐야?']
        },
        '생물': {
            icon: '🧬',
            chips: ['세포 구조', 'DNA와 유전', '광합성 과정', '진화론 핵심'],
            asks: ['세포 구조 설명해줘', 'DNA 복제 과정 알려줘', '광합성 어떻게 일어나?', '진화론 핵심 개념 뭐야?']
        }
    };
 
    let conversationHistory = JSON.parse(localStorage.getItem('verbalis_history_v3')) || [];
 
    function buildSystemPrompt() {
        return `너는 Verbalis야. 한국의 ${currentSubject} 과외 선생님이야. 학생 수준은 ${currentLevel}야.
 
규칙:
1. 친근하고 따뜻하게 말해줘. 존댓말 쓰지 말고 편하게.
2. 문제는 바로 답 주지 말고, 먼저 힌트를 줘.
3. 학생이 3번 틀리면 그때 정답을 알려줘. 현재 틀린 횟수: ${wrongCount}번.
4. 개념 설명이 필요할 땐 ${currentLevel} 수준에 맞게 쉽게 설명해줘.
5. 그래프가 필요하면 답변 끝에 반드시 [GRAPH:수식] 형식으로 추가해. x의 거듭제곱은 ** 사용, 곱셈은 * 사용.
6. 답변 맨 앞에 반드시 [힌트], [설명], [정답] 중 하나를 붙여줘.
7. 잘 했을 때는 칭찬해줘. 틀렸을 때도 격려해줘.`;
    }
 
    function renderChips() {
        const data = subjectData[currentSubject];
        const container = document.getElementById('welcome-chips');
        container.innerHTML = data.chips.map((c, i) =>
            `<div class="chip" onclick="quickAsk('${data.asks[i]}')">${c}</div>`
        ).join('');
    }
 
    function setSubject(subject, icon, btn) {
        currentSubject = subject;
        currentIcon = subjectData[subject].icon;
        document.querySelectorAll('.subject-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('header-subject').textContent = `${currentIcon} ${subject}`;
        document.getElementById('welcome-icon').textContent = currentIcon;
        document.getElementById('welcome-title').textContent = `${subject} 선생님입니다. 무엇이든 물어보세요.`;
        renderChips();
    }
 
    function setLevel(level) {
        currentLevel = level;
        document.getElementById('header-level').textContent = level;
    }
 
    function quickAsk(text) {
        document.getElementById('user-input').value = text;
        sendMessage();
    }
 
    function clearChat() {
        if (!confirm('대화 내용을 모두 지울까요?')) return;
        conversationHistory = [];
        localStorage.removeItem('verbalis_history_v3');
        wrongCount = 0;
        document.getElementById('chat-box').innerHTML = `
            <div class="welcome" id="welcome">
                <div class="welcome-icon" id="welcome-icon">${currentIcon}</div>
                <div class="welcome-title" id="welcome-title">${currentSubject} 선생님입니다. 무엇이든 물어보세요.</div>
                <div class="welcome-chips" id="welcome-chips"></div>
            </div>`;
        renderChips();
        document.getElementById('canvas-area').style.display = 'none';
    }
 
    function appendMessage(role, content) {
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.remove();
 
        const chatBox = document.getElementById('chat-box');
        const wrap = document.createElement('div');
        wrap.className = `message-wrap ${role}`;
 
        let tagHtml = '';
        let cleanContent = content;
 
        if (role === 'ai') {
            if (content.startsWith('[힌트]')) {
                tagHtml = '<div class="msg-tag tag-hint">💡 힌트</div>';
                cleanContent = content.replace('[힌트]', '').trim();
            } else if (content.startsWith('[설명]')) {
                tagHtml = '<div class="msg-tag tag-explain">📖 설명</div>';
                cleanContent = content.replace('[설명]', '').trim();
            } else if (content.startsWith('[정답]')) {
                tagHtml = '<div class="msg-tag tag-answer">✅ 정답</div>';
                cleanContent = content.replace('[정답]', '').trim();
            }
        }
 
        if (role === 'user') {
            wrap.innerHTML = `<div><div class="sender">YOU</div><div class="bubble">${cleanContent}</div></div>`;
        } else {
            wrap.innerHTML = `<div><div class="sender">VERBALIS</div>${tagHtml}<div class="bubble">${cleanContent}</div></div>`;
        }
 
        chatBox.appendChild(wrap);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
 
    function drawGraph(expression) {
        const canvasArea = document.getElementById('canvas-area');
        const canvas = document.getElementById('mathCanvas');
        const ctx = canvas.getContext('2d');
 
        canvas.width = canvas.offsetWidth || 700;
        const w = canvas.width, h = canvas.height;
        const cx = w / 2, cy = h / 2, scale = 30;
 
        ctx.clearRect(0, 0, w, h);
 
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 1;
        for (let i = -10; i <= 10; i++) {
            ctx.beginPath(); ctx.moveTo(cx + i * scale, 0); ctx.lineTo(cx + i * scale, h); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, cy + i * scale); ctx.lineTo(w, cy + i * scale); ctx.stroke();
        }
 
        ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(w, cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke();
 
        ctx.fillStyle = '#2a2a2a'; ctx.font = '9px DM Mono, monospace';
        ctx.textAlign = 'center';
        for (let i = -8; i <= 8; i++) {
            if (i !== 0) ctx.fillText(i, cx + i * scale, cy + 14);
        }
 
        ctx.strokeStyle = '#4af'; ctx.lineWidth = 2;
        ctx.beginPath();
        let started = false;
        for (let px = 0; px < w; px++) {
            const x = (px - cx) / scale;
            let y;
            try { y = eval(expression.replace(/x/g, `(${x})`)); } catch(e) { continue; }
            const py = cy - y * scale;
            if (isNaN(py) || !isFinite(py)) { started = false; continue; }
            if (!started) { ctx.moveTo(px, py); started = true; }
            else ctx.lineTo(px, py);
        }
        ctx.stroke();
        canvasArea.style.display = 'block';
    }
 
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const message = input.value.trim();
        if (!message) return;
 
        appendMessage('user', message);
        input.value = '';
 
        const chatBox = document.getElementById('chat-box');
        const typingEl = document.createElement('div');
        typingEl.id = 'typing';
        typingEl.className = 'typing';
        typingEl.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
        chatBox.appendChild(typingEl);
        chatBox.scrollTop = chatBox.scrollHeight;
 
        conversationHistory.push({ role: 'user', content: message });
 
        const messages = [
            { role: 'system', content: buildSystemPrompt() },
            ...conversationHistory
        ];
 
        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: 'llama-3.3-70b-versatile',
                    messages: messages,
                    temperature: 0.7
                })
            });
 
            const data = await response.json();
            const reply = data.choices[0].message.content;
 
            conversationHistory.push({ role: 'assistant', content: reply });
            localStorage.setItem('verbalis_history_v3', JSON.stringify(conversationHistory));
 
            document.getElementById('typing')?.remove();
 
            const graphMatch = reply.match(/\[GRAPH:([^\]]+)\]/);
            if (graphMatch) drawGraph(graphMatch[1]);
 
            const cleanReply = reply.replace(/\[GRAPH:[^\]]+\]/g, '').trim();
            appendMessage('ai', cleanReply);
 
            // 오답 카운트
            const lc = reply.toLowerCase();
            if (lc.includes('틀') || lc.includes('아쉽') || lc.includes('다시 생각')) {
                wrongCount = Math.min(wrongCount + 1, 3);
            } else if (lc.includes('정확') || lc.includes('맞아') || reply.includes('정답')) {
                wrongCount = 0;
            }
 
        } catch(err) {
            document.getElementById('typing')?.remove();
            appendMessage('ai', '[설명] 잠깐 연결이 끊겼어. 다시 한번 보내줄 수 있어?');
        }
    }
 
    function loadHistory() {
        if (conversationHistory.length === 0) { renderChips(); return; }
        document.getElementById('welcome')?.remove();
        conversationHistory.forEach(msg => {
            if (msg.role === 'user') appendMessage('user', msg.content);
            else if (msg.role === 'assistant') {
                const clean = msg.content.replace(/\[GRAPH:[^\]]+\]/g, '').trim();
                appendMessage('ai', clean);
            }
        });
    }
 
    document.getElementById('user-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });
 
    loadHistory();
</script>
</body>
</html>
