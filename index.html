<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verbalis - Pro Engine</title>
<script src="[https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js](https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js)"></script>
<link rel="stylesheet" href="[https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css](https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css)">
<link href="[https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap](https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap)" rel="stylesheet">
<style>
/* 기본 세팅 */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#050505;--bg2:#080808;--bg3:#0a0a0a;--bg4:#0f0f0f;
  --border:#1a1a1a;--border2:#1e1e1e;
  --text:#e0e0e0;--text2:#ccc;--text3:#888;--text4:#444;--text5:#333;--text6:#2a2a2a;
  --accent:#fff;--accent-inv:#000;
  --bubble-user:#151515;--bubble-ai:#0f0f0f;
  --purple:#7c6fff;--purple-dim:#2a2450;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;display:flex;height:100vh;overflow:hidden;}

/* 사이드바 */
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-logo{padding:24px 18px 20px;border-bottom:1px solid var(--border);}
.logo-text{font-size:16px;font-weight:700;letter-spacing:5px;color:var(--accent);}
.logo-sub{font-size:9px;letter-spacing:2px;color:var(--text6);margin-top:4px;}
.nav-btn{display:flex;align-items:center;gap:10px;padding:12px 18px;font-size:12px;color:var(--text4);cursor:pointer;background:none;border:none;width:100%;text-align:left;letter-spacing:1px;transition:all 0.15s;}
.nav-btn.active{color:var(--accent);background:var(--bg3);border-left:2px solid var(--accent);}
.sidebar-bottom{padding:12px;border-top:1px solid var(--border);margin-top:auto;}
.clear-btn{width:100%;padding:10px;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;color:var(--text4);font-size:11px;cursor:pointer;}

/* 메인 영역 */
.main{flex:1;display:flex;flex-direction:column;}
.header{padding:18px 28px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;}
.header-title{font-size:13px;font-weight:500;letter-spacing:2px;}
.status{font-size:10px;color:var(--text5);letter-spacing:1px;display:flex;align-items:center;gap:6px;}
.status-dot{width:6px;height:6px;background:#4CAF50;border-radius:50%;}

/* 튜터 레이아웃 */
#page-tutor{flex:1;display:flex;overflow:hidden;}
.whiteboard{flex:1;background:#fafafa;position:relative;display:none;align-items:center;justify-content:center;}
.whiteboard.active{display:flex;}
.wb-label{position:absolute;top:20px;left:20px;font-size:10px;color:#888;letter-spacing:2px;font-weight:bold;}

/* 🎬 비디오 플레이스홀더 UI (핵심 변경점) */
.video-box{
  width:80%; max-width:600px; padding:40px; background:#fff; 
  border:2px dashed #7c6fff; border-radius:12px; text-align:center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}
.video-icon{font-size:48px; margin-bottom:16px;}
.video-title{font-size:16px; color:#333; font-weight:bold; margin-bottom:8px;}
.video-file{font-size:13px; color:#7c6fff; background:#f0f0ff; padding:4px 12px; border-radius:20px; display:inline-block; margin-bottom:20px;}
.wb-text{font-size:22px; color:#111; font-weight:700; padding-top:20px; border-top:1px solid #eee; margin-top:10px;}

/* 채팅 영역 */
.chatpanel{width:400px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;}
.chatpanel.fullscreen{width:100%;border-left:none;}
.chat-messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;}
.msg{display:flex;flex-direction:column;gap:6px;}
.msg.user{align-items:flex-end;}
.msg.ai{align-items:flex-start;}
.msg-sender{font-size:10px;color:var(--text5);font-weight:bold;}
.msg-bubble{padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;max-width:85%;word-break:break-word;}
.msg.user .msg-bubble{background:var(--bg4);color:var(--text2);border:1px solid var(--border2);}
.msg.ai .msg-bubble{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-left:3px solid var(--purple);}

/* 입력창 */
.input-area{padding:20px;background:var(--bg2);border-top:1px solid var(--border2);display:flex;gap:10px;}
#user-input{flex:1;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:14px;outline:none;}
#send-btn{padding:0 24px;background:var(--accent);color:var(--accent-inv);border:none;border-radius:8px;font-weight:bold;cursor:pointer;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo"><div class="logo-text">VERBALIS</div><div class="logo-sub">PRO ENGINE</div></div>
  <button class="nav-btn active">📚 AI 과외 (JSON Mode)</button>
  <div class="sidebar-bottom"><button class="clear-btn" id="clear-btn">대화 기록 싹 지우기</button></div>
</div>

<div class="main">
  <div class="header">
    <div class="header-title">시각화 엔진 테스트</div>
    <div class="status"><div class="status-dot"></div>API 연결됨</div>
  </div>

  <div id="page-tutor">
    <div class="whiteboard" id="whiteboard">
      <div class="wb-label">VERBALIS BOARD</div>
      <div id="anim-container"></div>
    </div>
    
    <div class="chatpanel fullscreen" id="chatpanel">
      <div class="chat-messages" id="chat-messages">
        <div class="msg ai">
          <div class="msg-sender">System</div>
          <div class="msg-bubble">엔진 초기화 완료. "이차함수 접선 그려줘" 라고 명령해 보세요.</div>
        </div>
      </div>
      <div class="input-area">
        <input type="text" id="user-input" placeholder="여기에 입력하세요..."/>
        <button id="send-btn">전송</button>
      </div>
    </div>
  </div>
</div>

<script>
// API 키 세팅
const PROXY_URL = "[https://verbalis.jashfnv.workers.dev](https://verbalis.jashfnv.workers.dev)";
const GROQ_KEY = "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";

let tutorHistory = [];

// 시스템 프롬프트 (절대 낙서 못하게 막음)
const systemPrompt = `너는 세계 최고의 소크라테스식 수학/과학 튜터야.
[절대 규칙]
1. 정답을 주지 말고 역질문으로 유도해.
2. SVG나 코드를 직접 그리지 마. 절대 금지.
3. 무조건 아래 JSON 포맷으로만 응답해. 마크다운이나 다른 설명 금지.

{
  "dialogue": "학생에게 할 말 (역질문)",
  "need_video": true 혹은 false,
  "video_filename": "틀어야 할 영상 이름 (예: parabola_tangent.mp4)",
  "whiteboard_text": "칠판에 강조할 수식이나 텍스트"
}`;

// API 통신
async function callAI(messages) {
  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1500, system: systemPrompt, messages: messages })
    });
    const data = await res.json();
    return data.content[0].text;
  } catch (e) {
    // 대체망 (Groq)
    const msgs = [{ role: 'system', content: systemPrompt }, ...messages];
    const res = await fetch('[https://api.groq.com/openai/v1/chat/completions](https://api.groq.com/openai/v1/chat/completions)', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
      body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: msgs })
    });
    const data = await res.json();
    return data.choices[0].message.content;
  }
}

// 안전한 JSON 파서 (마크다운 찌꺼기 제거)
function extractJSON(text) {
  try {
    const start = text.indexOf('{');
    const end = text.lastIndexOf('}');
    if (start === -1 || end === -1) return null;
    return JSON.parse(text.substring(start, end + 1));
  } catch (e) {
    return null; // 파싱 실패 시 null 반환
  }
}

// 채팅 UI 업데이트
function appendMsg(role, text) {
  const box = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-sender">${role === 'user' ? '나' : 'Verbalis'}</div>
                   <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// 칠판 UI 컨트롤
function updateWhiteboard(data) {
  const wb = document.getElementById('whiteboard');
  const panel = document.getElementById('chatpanel');
  const container = document.getElementById('anim-container');

  if (data.need_video && data.video_filename) {
    wb.classList.add('active');
    panel.classList.remove('fullscreen');
    
    // 강제 비디오 플레이스홀더 렌더링 (낙서 불가)
    container.innerHTML = `
      <div class="video-box">
        <div class="video-icon">🎬</div>
        <div class="video-title">시스템에서 다음 영상을 호출했습니다:</div>
        <div class="video-file">${data.video_filename}</div>
        <div style="font-size:12px; color:#888;">(개발자가 이 파일명으로 영상을 연결하면 재생됩니다)</div>
        <div class="wb-text">${data.whiteboard_text || ''}</div>
      </div>
    `;
  } else {
    wb.classList.remove('active');
    panel.classList.add('fullscreen');
  }
}

// 메인 전송 로직
async function sendTutor() {
  const input = document.getElementById('user-input');
  const msg = input.value.trim();
  if (!msg) return;

  appendMsg('user', msg);
  input.value = '';
  tutorHistory.push({ role: 'user', content: msg });
  appendMsg('ai', '분석 중...'); // 로딩 메시지

  try {
    const replyRaw = await callAI(tutorHistory.slice(-10));
    
    // 로딩 메시지 삭제
    const chatBox = document.getElementById('chat-messages');
    chatBox.removeChild(chatBox.lastChild);

    // AI 응답 정제
    const parsedData = extractJSON(replyRaw);

    if (parsedData) {
      tutorHistory.push({ role: 'assistant', content: parsedData.dialogue });
      appendMsg('ai', parsedData.dialogue);
      updateWhiteboard(parsedData);
    } else {
      // JSON 파싱 완전 실패 시 비상 처리 (에러 방어)
      tutorHistory.push({ role: 'assistant', content: replyRaw });
      appendMsg('ai', "데이터 형식이 꼬였어. 텍스트로만 답할게: \n" + replyRaw);
    }

  } catch (e) {
    const chatBox = document.getElementById('chat-messages');
    chatBox.removeChild(chatBox.lastChild);
    appendMsg('ai', '서버 에러가 발생했습니다.');
  }
}

// 이벤트 리스너
document.getElementById('send-btn').addEventListener('click', sendTutor);
document.getElementById('user-input').addEventListener('keypress', e => { if (e.key === 'Enter') sendTutor(); });
document.getElementById('clear-btn').addEventListener('click', () => {
  tutorHistory = [];
  document.getElementById('chat-messages').innerHTML = '<div class="msg ai"><div class="msg-sender">System</div><div class="msg-bubble">초기화 완료.</div></div>';
  updateWhiteboard({ need_video: false });
});
</script>
</body>
</html>
