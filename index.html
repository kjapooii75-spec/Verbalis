<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verbalis</title>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjs@11.11.0/lib/browser/math.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#050505; color:#e0e0e0; font-family:'Noto Sans KR','Helvetica Neue',sans-serif; display:flex; height:100vh; overflow:hidden; }

/* SIDEBAR */
.sidebar { width:200px; background:#080808; border-right:1px solid #1a1a1a; display:flex; flex-direction:column; flex-shrink:0; }
.sidebar-logo { padding:24px 18px 20px; border-bottom:1px solid #1a1a1a; }
.logo-text { font-size:16px; font-weight:700; letter-spacing:5px; color:#fff; }
.logo-sub { font-size:9px; letter-spacing:2px; color:#2a2a2a; margin-top:4px; }
.sidebar-section { font-size:9px; letter-spacing:2px; color:#2a2a2a; padding:16px 18px 8px; text-transform:uppercase; }
.nav-btn { display:flex; align-items:center; gap:10px; padding:10px 18px; font-size:12px; color:#444; cursor:pointer; background:none; border:none; width:100%; text-align:left; letter-spacing:1px; transition:all 0.15s; font-family:'Noto Sans KR',sans-serif; }
.nav-btn:hover { color:#aaa; background:#0f0f0f; }
.nav-btn.active { color:#fff; background:#111; border-left:2px solid #fff; }
.sidebar-divider { border:none; border-top:1px solid #1a1a1a; margin:8px 0; }
.subject-btn { display:flex; align-items:center; gap:8px; padding:8px 18px; font-size:12px; color:#333; cursor:pointer; background:none; border:none; width:100%; text-align:left; letter-spacing:1px; transition:all 0.15s; font-family:'Noto Sans KR',sans-serif; }
.subject-btn:hover { color:#888; }
.subject-btn.active { color:#ccc; }
.level-wrap { padding:0 12px 8px; }
.level-select { width:100%; padding:8px 10px; background:#0f0f0f; border:1px solid #1e1e1e; border-radius:2px; color:#666; font-size:11px; font-family:'Noto Sans KR',sans-serif; cursor:pointer; outline:none; appearance:none; }
.sidebar-bottom { margin-top:auto; padding:12px; border-top:1px solid #1a1a1a; }
.clear-btn { width:100%; padding:8px; background:none; border:1px solid #1a1a1a; border-radius:2px; color:#333; font-size:10px; letter-spacing:1px; cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:all 0.15s; }
.clear-btn:hover { color:#666; border-color:#333; }

/* MAIN */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
.header { display:flex; align-items:center; justify-content:space-between; padding:18px 28px; border-bottom:1px solid #1e1e1e; flex-shrink:0; }
.header-title { font-size:12px; font-weight:500; letter-spacing:3px; color:#fff; }
.header-sub { font-size:9px; letter-spacing:2px; color:#2a2a2a; margin-top:3px; }
.status { display:flex; align-items:center; gap:6px; font-size:9px; color:#2a2a2a; letter-spacing:2px; }
.status-dot { width:5px; height:5px; background:#2a2a2a; border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* RADAR */
#page-radar { flex:1; overflow-y:auto; padding:28px; scrollbar-width:none; }
#page-radar::-webkit-scrollbar{display:none;}
.radar-live { display:flex; align-items:center; gap:6px; font-size:9px; letter-spacing:2px; color:#444; text-transform:uppercase; margin-bottom:12px; }
.live-dot { width:5px; height:5px; background:#fff; border-radius:50%; animation:pulse 1.5s infinite; }
.radar-title { font-size:22px; font-weight:500; color:#fff; letter-spacing:-0.5px; line-height:1.4; margin-bottom:20px; }
.radar-title span{color:#888;}
.ask-bar { display:flex; gap:8px; max-width:580px; margin-bottom:14px; }
.ask-input { flex:1; padding:12px 16px; background:#0a0a0a; border:1px solid #1e1e1e; border-radius:2px; color:#e0e0e0; font-size:13px; font-family:'Noto Sans KR',sans-serif; outline:none; transition:border-color 0.15s; }
.ask-input:focus{border-color:#333;}
.ask-input::placeholder{color:#222;}
.ask-btn { padding:12px 20px; background:#fff; color:#000; border:none; border-radius:2px; font-size:11px; font-weight:700; letter-spacing:2px; cursor:pointer; white-space:nowrap; transition:background 0.15s; font-family:'Noto Sans KR',sans-serif; }
.ask-btn:hover{background:#ccc;}
.ask-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:24px; }
.ask-chip { padding:5px 12px; border:1px solid #1e1e1e; border-radius:2px; font-size:11px; color:#333; cursor:pointer; transition:all 0.15s; letter-spacing:0.5px; }
.ask-chip:hover{color:#aaa;border-color:#333;}
#ai-box{display:none;margin-bottom:24px;max-width:580px;}
.ai-box-inner{background:#0a0a0a;border:1px solid #2a2a2a;border-left:2px solid #fff;border-radius:2px;animation:fadeUp 0.25s ease;}
.ai-box-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #1a1a1a;}
.ai-box-label{font-size:9px;letter-spacing:2px;color:#555;text-transform:uppercase;}
.ai-box-close{background:none;border:none;color:#333;cursor:pointer;font-size:16px;}
.ai-box-body{padding:16px;font-size:13.5px;line-height:1.85;color:#ccc;white-space:pre-wrap;min-height:48px;}
.typing-dots{display:flex;gap:5px;padding:4px 0;}
.tdot{width:5px;height:5px;background:#333;border-radius:50%;animation:bounce 1.2s infinite;}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
.dday-strip{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.dday-card{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:2px;padding:12px 16px;flex:1;min-width:140px;}
.dday-label{font-size:9px;letter-spacing:2px;color:#333;text-transform:uppercase;margin-bottom:6px;}
.dday-name{font-size:12px;color:#888;margin-bottom:4px;}
.dday-num{font-size:20px;font-weight:700;color:#fff;}
.trending-strip{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;}
.trend-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #1a1a1a;border-radius:2px;cursor:pointer;transition:all 0.15s;}
.trend-chip:hover{border-color:#333;}
.trend-rank{font-size:9px;color:#333;}
.trend-text{font-size:11px;color:#555;}
.trend-up{font-size:9px;color:#666;}
.news-grid-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-top:4px;border-top:1px solid #1a1a1a;}
.news-grid-title{font-size:10px;letter-spacing:2px;color:#444;text-transform:uppercase;}
.filter-tabs{display:flex;gap:4px;}
.filter-tab{padding:4px 10px;border:1px solid #1a1a1a;border-radius:2px;font-size:10px;color:#333;cursor:pointer;background:none;letter-spacing:1px;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;}
.filter-tab:hover{color:#888;border-color:#333;}
.filter-tab.active{color:#fff;border-color:#fff;background:#111;}
.news-card{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:2px;padding:18px 20px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;position:relative;}
.news-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;transition:background 0.15s;}
.news-card:hover{background:#0f0f0f;}
.news-card:hover::before{background:#fff;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.card-tags{display:flex;gap:5px;}
.ctag{font-size:9px;letter-spacing:1.5px;padding:2px 7px;border-radius:1px;text-transform:uppercase;}
.ct-hot{background:#1a1000;color:#887030;border:1px solid #2a2000;}
.ct-policy{background:#0a100a;color:#3a6a3a;border:1px solid #1a2a1a;}
.ct-tip{background:#0a0a18;color:#3a3a8a;border:1px solid #1a1a2a;}
.ct-suneung{background:#150a0a;color:#8a4a4a;border:1px solid #2a1515;}
.card-date{font-size:10px;color:#2a2a2a;}
.card-title{font-size:14px;font-weight:500;color:#ccc;line-height:1.5;margin-bottom:7px;}
.card-summary{font-size:12.5px;color:#444;line-height:1.7;margin-bottom:10px;}
.card-ai-summary{display:none;background:#080808;border:1px solid #1a1a1a;border-left:2px solid #2a2a2a;padding:10px 14px;font-size:12px;color:#666;line-height:1.8;white-space:pre-wrap;margin-bottom:10px;}
.card-ai-label{font-size:9px;letter-spacing:1.5px;color:#333;text-transform:uppercase;margin-bottom:6px;}
.card-bottom{display:flex;align-items:center;justify-content:space-between;}
.card-impact{font-size:11px;color:#2a2a2a;}
.expand-btn{font-size:10px;color:#444;background:none;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;letter-spacing:1px;transition:color 0.15s;}
.expand-btn:hover{color:#aaa;}

/* TUTOR */
#page-tutor{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#chat-box{flex:1;overflow-y:auto;padding:20px 28px;scrollbar-width:none;}
#chat-box::-webkit-scrollbar{display:none;}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:10px;animation:fadeUp 0.4s ease;}
.welcome-icon{font-size:32px;}
.welcome-title{font-size:12px;letter-spacing:3px;color:#444;}
.welcome-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:8px;}
.w-chip{padding:6px 13px;border:1px solid #1e1e1e;border-radius:2px;font-size:11px;letter-spacing:0.5px;color:#333;cursor:pointer;transition:all 0.15s;font-family:'Noto Sans KR',sans-serif;}
.w-chip:hover{color:#aaa;border-color:#444;}
.message-wrap{display:flex;margin:12px 0;animation:fadeUp 0.2s ease;}
.message-wrap.user{justify-content:flex-end;}
.message-wrap.ai{justify-content:flex-start;}
.bubble{max-width:75%;padding:12px 16px;border-radius:2px;font-size:14px;line-height:1.75;word-break:break-word;}
.user .bubble{background:#151515;color:#888;border:1px solid #1e1e1e;}
.ai .bubble{background:#0f0f0f;color:#e0e0e0;border:1px solid #1a1a1a;border-left:2px solid #333;}
.sender{font-size:9px;letter-spacing:2px;color:#2a2a2a;margin-bottom:5px;}
.message-wrap.user .sender{text-align:right;}
.math-inline{display:inline;}
.math-block{display:block;margin:12px 0;padding:12px;background:#0a0a0a;border-radius:4px;overflow-x:auto;}
.graph-in-bubble{margin:10px 0;max-width:260px;min-height:140px;background:#0a0a0a;border-radius:4px;padding:8px;}
.graph-placeholder{display:flex;align-items:center;justify-content:center;}
.retry-btn{margin-top:8px;padding:6px 12px;font-size:11px;background:#333;color:#fff;border:none;border-radius:2px;cursor:pointer;}
.retry-btn:hover{background:#444;}
.error .bubble{border-left-color:#8b2635!important;color:#c44;}
.typing-wrap{display:flex;padding:6px 0;}
.typing-bubble{background:#0f0f0f;border:1px solid #1a1a1a;border-left:2px solid #333;padding:12px 16px;display:flex;align-items:center;gap:5px;}
#tutor-input-area{display:flex;gap:10px;border-top:1px solid #1e1e1e;padding:18px 28px;flex-shrink:0;}
#user-input{flex:1;padding:12px 16px;background:#0a0a0a;border:1px solid #1e1e1e;color:#e0e0e0;border-radius:2px;font-size:14px;outline:none;font-family:'Noto Sans KR',sans-serif;transition:border-color 0.15s;}
#user-input:focus{border-color:#2a2a2a;}
#user-input::placeholder{color:#1e1e1e;}
.send-btn{padding:12px 22px;background:#ffffff;color:#000;border:none;border-radius:2px;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:2px;font-family:'Noto Sans KR',sans-serif;transition:background 0.15s;}
.send-btn:hover{background:#ccc;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media(max-width:600px){.sidebar{display:none;}.header,#page-radar,#chat-box,#tutor-input-area{padding-left:16px;padding-right:16px;}}
</style>
</head>

<script>
// ── Groq API 호출 함수 ──────────────────────────────
const API_KEY = "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";

async function callClaude(messages, systemPrompt) {
  const groqMessages = systemPrompt
    ? [{role:'system', content: systemPrompt}, ...messages]
    : messages;

  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${API_KEY}`
    },
    body: JSON.stringify({
      model: 'llama-3.1-8b-instant',
      max_tokens: 1000,
      messages: groqMessages
    })
  });

  const data = await res.json();
  if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
  return data.choices[0].message.content;
}
// ────────────────────────────────────────────────────

function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

function renderContent(text) {
  if (!text) return '';
  const ph = [];
  let out = text
    .replace(/\[GRAPH:([^\]]+)\]/g, (_,e) => { ph.push(renderGraph(e.trim())); return '\uE000'+(ph.length-1)+'\uE000'; })
    .replace(/\\\[([\s\S]*?)\\\]/g, (_,m) => { try { const s=document.createElement('span'); s.className='math-block'; katex.render(m.trim(),s,{displayMode:true,throwOnError:false}); ph.push(s.outerHTML); } catch(e){ph.push(escapeHtml('\\['+m+'\\]'));} return '\uE000'+(ph.length-1)+'\uE000'; })
    .replace(/\\\(([\s\S]*?)\\\)/g, (_,m) => { try { const s=document.createElement('span'); s.className='math-inline'; katex.render(m.trim(),s,{displayMode:false,throwOnError:false}); ph.push(s.outerHTML); } catch(e){ph.push(escapeHtml('\\('+m+'\\)'));} return '\uE000'+(ph.length-1)+'\uE000'; });
  out = escapeHtml(out);
  ph.forEach((p,i) => { out = out.split('\uE000'+i+'\uE000').join(p); });
  return out.replace(/\n/g,'<br>');
}

function renderGraph(expr) {
  return `<div class="graph-in-bubble graph-placeholder" data-graph="${escapeHtml(expr).replace(/"/g,'&quot;')}"></div>`;
}

function initGraphs(container) {
  (container||document).querySelectorAll('.graph-placeholder:not(.inited)').forEach(el => {
    const expr = el.getAttribute('data-graph');
    if (!expr) return;
    try {
      const rs = expr.replace(/^y\s*=\s*/i,'').replace(/\^/g,'**');
      const pts = [];
      for (let x=-10;x<=10;x+=0.35) { try { const y=math.evaluate(rs.replace(/\bx\b/g,`(${x})`)); if(isFinite(y)) pts.push({x,y}); } catch(_){} }
      el.classList.add('inited');
      const canvas = document.createElement('canvas');
      el.appendChild(canvas);
      new Chart(canvas, { type:'line', data:{ datasets:[{data:pts,borderColor:'#4a9eff',borderWidth:2,pointRadius:0,tension:0.2,fill:false}] }, options:{ animation:{duration:800}, responsive:true, maintainAspectRatio:true, aspectRatio:1.5, plugins:{legend:{display:false}}, scales:{ x:{type:'linear',min:-10,max:10,grid:{color:'#1a1a1a'},ticks:{color:'#555',maxTicksLimit:6}}, y:{grid:{color:'#1a1a1a'},ticks:{color:'#555',maxTicksLimit:6}} } } });
    } catch(e) { el.innerHTML='<span style="color:#555">그래프 오류</span>'; }
  });
}

};

function buildSystemPrompt() {
  return `넌 ${currentSubject} 과외 선생님이야. 학생 수준은 ${currentLevel}이야.
말투: 친근하고 편하게. 반드시 한국어로만 답해. 절대 영어나 한자 쓰지 마.
역할: ${currentSubject}만 가르쳐. 핵심만 짚어줘. 막히면 힌트부터 줘. 3번 틀리면 정답 알려줘. 현재 틀린 횟수: ${wrongCount}번.
수식: 반드시 LaTeX로 써. 인라인은 \\( 수식 \\), 줄 단위는 \\[ 수식 \\].
그래프: [GRAPH:y=수식] 형식으로 그려줘. 예: [GRAPH:y=x**2]`;
}

function clearTutor() {
  if(!confirm('대화를 초기화할까요?')) return;
  tutorHistory=[]; localStorage.removeItem('verbalis_v5'); wrongCount=0;
  document.getElementById('chat-box').innerHTML=`<div class="welcome" id="welcome"><div class="welcome-icon" id="welcome-icon">${currentIcon}</div><div class="welcome-title" id="welcome-title">${currentSubject} 선생님 — 무엇이든 물어봐</div><div class="welcome-chips" id="welcome-chips"></div></div>`;
  renderWelcomeChips();

function appendMsg(role, content) {
  document.getElementById('welcome')?.remove();
  const box=document.getElementById('chat-box');
  const wrap=document.createElement('div'); wrap.className=`message-wrap ${role}`;
  if(role==='user') wrap.innerHTML=`<div><div class="sender">나</div><div class="bubble">${escapeHtml(content)}</div></div>`;
  else wrap.innerHTML=`<div><div class="sender">선생님</div><div class="bubble">${renderContent(content)}</div></div>`;
  box.appendChild(wrap); box.scrollTop=box.scrollHeight;
  setTimeout(()=>initGraphs(box),50);
}

function showTyping() {
  const box=document.getElementById('chat-box');
  const el=document.createElement('div'); el.id='typing-el'; el.className='typing-wrap';
  el.innerHTML=`<div class="typing-bubble"><div class="typing-dots"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div></div>`;
  box.appendChild(el); box.scrollTop=box.scrollHeight;
}

async function sendTutor() {
  const input=document.getElementById('user-input');
  const msg=input.value.trim(); if(!msg) return;
  appendMsg('user',msg); input.value=''; showTyping();
  tutorHistory.push({role:'user',content:msg});
  try {
    const reply = await callClaude(
      tutorHistory.slice(-20),
      buildSystemPrompt()
    );
    tutorHistory.push({role:'assistant',content:reply});
    localStorage.setItem('verbalis_v5',JSON.stringify(tutorHistory));
    document.getElementById('typing-el')?.remove();
    appendMsg('ai',reply);
    const lc=reply.toLowerCase();
    if(lc.includes('틀')||lc.includes('아쉽')) wrongCount=Math.min(wrongCount+1,3);
    else if(lc.includes('맞아')||lc.includes('정확')) wrongCount=0;
  } catch(e) {
    document.getElementById('typing-el')?.remove();
    tutorHistory.pop();
    const errId='err-'+Date.now();
    const box=document.getElementById('chat-box');
    const wrap=document.createElement('div'); wrap.className='message-wrap ai error'; wrap.id=errId;
    wrap.innerHTML=`<div><div class="sender">선생님</div><div class="bubble">연결이 끊겼어. 다시 보내볼게!<br><small style="color:#555">${e.message}</small><br><button class="retry-btn" onclick="retryLast('${errId}')">다시 보내기</button></div></div>`;
    box.appendChild(wrap); box.scrollTop=box.scrollHeight;
  }
}

function retryLast(errId) {
  document.getElementById(errId)?.remove();
  const last=tutorHistory[tutorHistory.length-1];
  if(last&&last.role==='user') { const msg=last.content; tutorHistory.pop(); document.getElementById('user-input').value=msg; sendTutor(); }
}

document.getElementById('user-input').addEventListener('keypress',e=>{if(e.key==='Enter')sendTutor();});
